<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Perfect Chat</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="base.css">
  <script src="utils.js" defer></script>
  <script src="auth.js" defer></script>
</head>
<body class="auth-page" onload="redirectIfAuthenticated()">
  <div class="form-container">
    <h2>Register</h2>
    <label for="reg_name">Name:</label>
    <input type="text" id="reg_name" placeholder="Display Name">

    <label for="reg_username">Username:</label>
    <input type="text" id="reg_username" placeholder="Choose a username" required>

    <label for="reg_email">Email:</label>
    <input type="email" id="reg_email" placeholder="Email" required>

    <label for="reg_pass">Password:</label>
    <input type="password" id="reg_pass" placeholder="Password" required>
    <button onclick="register()">Sign Up</button>
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>
</body>
</html>
