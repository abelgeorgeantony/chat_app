<!DOCTYPE html>
<html>
<head>
  <title>Perfect Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="base.html">
  <link rel="stylesheet" href="chat.css">
  <script src="utils.js" defer></script>
  <script src="auth.js" defer></script>
  <script src="chat.js" defer></script>
</head>
<body class="chat-page">
  <div id="chat-app">
    
    <!-- Sidebar: Chat List -->
    <aside id="chat-list">
      <div class="chat-header">
        <h2>Chats</h2>
	<button id="add-contact-btn" onclick="showAddContactForm()">+ Add</button>
        <button id="profile-btn" onclick="goToProfile()">👤</button>
      </div>
      <div id="add-contact-form" style="display: none; margin-top: 10px;">
	      <input type="text" id="new-contact-username" placeholder="Enter username">
	      <button onclick="addContact()">Add</button>
	      <button onclick="hideAddContactForm()">Cancel</button>
      </div>
      <div id="user-list">
        <!-- Contacts injected here -->
      </div>
    </aside>

    <!-- Chat Window -->
    <main id="chat-view">
      <header>
        <button id="back-btn" onclick="goBackToList()">← Back</button>
        <h3 id="chat-title">Start a new chat</h3>
      </header>
      <div id="messages">
        <!-- Messages go here -->
      </div>
      <form id="message-form">
        <input type="text" id="message-input" placeholder="Type a message..." required />
        <button type="button" id="send-button">Send</button>
      </form>
    </main>

  </div>
</body>
</html>
